<!DOCTYPE html>
<html lang="en" data-theme="light" data-fontsize="large">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Gospel Scroll - Read the four Gospels in a calm, infinite-scroll experience.">
  <title>Gospel Scroll</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400&family=Source+Serif+4:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <header class="topbar">
    <div class="topbar-brand">
      <div class="topbar-title"><svg class="scroll-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 3a2 2 0 0 0-2 2v2a2 2 0 0 0 2 2h1V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2v-4H5a2 2 0 0 1-2-2v-2"/><path d="M8 3v18"/><line x1="12" y1="7" x2="17" y2="7"/><line x1="12" y1="11" x2="17" y2="11"/><line x1="12" y1="15" x2="15" y2="15"/></svg>GospelScroll<sup class="tm">™</sup></div>
      <div class="topbar-tagline">Effortless Gospel Reading</div>
    </div>
    <div class="topbar-controls">
      <span id="read-counter" class="read-counter">0 read</span>
      <select id="font-size-select" aria-label="Font size">
        <option value="small">Small</option>
        <option value="medium">Medium</option>
        <option value="large" selected>Large</option>
        <option value="xlarge">Extra Large</option>
        <option value="vlarge">Very Large</option>
      </select>
      <button id="theme-toggle" aria-label="Toggle theme">&#9790;</button>
    </div>
  </header>
  <main id="feed"></main>
  <div id="sentinel"></div>
  <script src="/js/app.js"></script>
</body>
</html>
